services:
  postgres:
    image: postgres:16-alpine
    container_name: ebill_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: energy_bill
      POSTGRES_USER: energy
      POSTGRES_PASSWORD: energy
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U energy -d energy_bill']
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: ebill_ollama
    restart: unless-stopped
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ['CMD-SHELL', 'ollama --version || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5

  localstack:
    image: localstack/localstack:latest
    container_name: ebill_localstack
    restart: unless-stopped
    environment:
      SERVICES: s3
      DEBUG: '0'
      AWS_DEFAULT_REGION: us-east-1
    ports:
      - '4566:4566'
    volumes:
      - localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker/localstack/init-s3.sh:/etc/localstack/init/ready.d/init-s3.sh

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ebill_backend
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql://energy:energy@postgres:5432/energy_bill?schema=public
      OLLAMA_BASE_URL: http://ollama:11434
      OPEN_SOURCE_IA: 'true'
      LLM_PROVIDER: ollama
      STORAGE_DRIVER: localstack
      S3_ENDPOINT: http://localstack:4566
      S3_BUCKET: energy-bills
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: test
      S3_SECRET_ACCESS_KEY: test
      S3_FORCE_PATH_STYLE: 'true'
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
      localstack:
        condition: service_started

volumes:
  postgres_data:
  ollama_data:
  localstack_data:
