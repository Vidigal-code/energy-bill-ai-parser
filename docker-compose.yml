  localstack:
    image: localstack/localstack:latest
    container_name: ebill_localstack
    restart: unless-stopped
    environment:
      SERVICES: s3
      DEBUG: '0'
      AWS_DEFAULT_REGION: us-east-1
    ports:
      - '4566:4566'
    volumes:
      - localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker/localstack/init-s3.sh:/etc/localstack/init/ready.d/init-s3.sh

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ebill_backend
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql://energy:energy@postgres:5432/energy_bill?schema=public
      OLLAMA_BASE_URL: http://ollama:11434
      OPEN_SOURCE_IA: 'false'
      LLM_PROVIDER: 'gemini'
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      STORAGE_DRIVER: localstack
      S3_ENDPOINT: http://localstack:4566
      S3_BUCKET: energy-bills
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: test
      S3_SECRET_ACCESS_KEY: test
      S3_FORCE_PATH_STYLE: 'true'
    command: sh -c "npx prisma db push && node dist/main.js"
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
#      ollama-init:
#        condition: service_completed_successfully
      localstack:
        condition: service_started
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/health || exit 1']
      interval: 20s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ebill_frontend
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      BACKEND_API_URL: http://backend:3000
      NEXT_PUBLIC_BACKEND_API_URL: http://localhost:3000
    ports:
      - '${FRONTEND_PORT:-3001}:3000'
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/login || exit 1']
      interval: 20s
      timeout: 5s
      retries: 10

  backend-tests:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    container_name: ebill_backend_tests
    env_file:
      - ./.env
    environment:
      NODE_ENV: test
      DATABASE_URL: postgresql://energy:energy@postgres:5432/energy_bill?schema=public
      LOGS: 'false'
    command: sh -c "npm run test:unit && npm run test:integration"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
#  ollama_data:
  localstack_data:
