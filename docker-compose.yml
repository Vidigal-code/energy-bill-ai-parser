services:
  postgres:
    image: postgres:16-alpine
    container_name: ebill_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: energy_bill
      POSTGRES_USER: energy
      POSTGRES_PASSWORD: energy
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U energy -d energy_bill']
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: ebill_ollama
    restart: unless-stopped
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ['CMD-SHELL', 'ollama --version || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ebill_backend
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql://energy:energy@postgres:5432/energy_bill?schema=public
      OLLAMA_BASE_URL: http://ollama:11434
      OPEN_SOURCE_IA: 'true'
      LLM_PROVIDER: ollama
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started

volumes:
  postgres_data:
  ollama_data:
