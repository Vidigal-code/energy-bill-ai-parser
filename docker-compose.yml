services:
  postgres:
    image: postgres:16-alpine
    container_name: ebill_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: energy_bill
      POSTGRES_USER: energy
      POSTGRES_PASSWORD: energy
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U energy -d energy_bill']
      interval: 10s
      timeout: 5s
      retries: 5

